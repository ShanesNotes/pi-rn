<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>pi-chart — agent canvas</title>
<meta name="viewport" content="width=1480" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a8a;
    --ink-4: #c4c4c4;
    --paper: #f4f2ee;
    --paper-2: #ebe8e2;
    --card: #fbfaf7;
    --card-2: #f7f5f0;
    --line: #1a1a1a;
    --hair: rgba(26,26,26,0.18);
    --hair-2: rgba(26,26,26,0.10);
    --grid: rgba(26,26,26,0.06);
    --accent: oklch(0.62 0.16 25);
    --accent-soft: oklch(0.62 0.16 25 / 0.10);
    --accent-line: oklch(0.62 0.16 25 / 0.30);
    --draft: oklch(0.62 0.14 70);          /* amber-ish for staged */
    --draft-soft: oklch(0.62 0.14 70 / 0.12);
    --draft-line: oklch(0.62 0.14 70 / 0.40);
    --ok: oklch(0.55 0.10 150);
    --sans: "Inter Tight", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 0%, #efece6 0%, var(--paper) 50%) fixed,
      var(--paper);
    font-size: 13px;
    line-height: 1.4;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; color: inherit; }

  /* ------------- frame ------------- */
  .stage {
    width: 1480px;
    margin: 0 auto;
    padding: 18px 22px 28px;
    transition: width 180ms ease, margin 180ms ease, padding 180ms ease;
  }
  body[data-scratch-layout="side"] .stage {
    width: calc(100vw - 360px);
    max-width: 1480px;
    margin-left: 0;
    margin-right: auto;
  }
  body[data-scratch-layout="side"] .agent-dock,
  body[data-scratch-layout="side"] .dock-rail { right: 360px; }

  .meta-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ------------- doc band ------------- */
  .docband {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 12px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .docband .left .crumb {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 5px;
  }
  .docband h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .docband h1 .pi {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: -0.04em;
  }
  .docband h1 .sep {
    color: var(--ink-3);
    font-weight: 400;
    margin: 0 8px;
  }
  .docband h1 .ctx {
    font-size: 14px;
    color: var(--ink-2);
    font-weight: 400;
    letter-spacing: 0;
    font-family: var(--mono);
  }
  .docband .right {
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
  }
  .docband .right .row { display: flex; gap: 18px; justify-content: flex-end; }
  .docband .right .row span b { color: var(--ink); font-weight: 500; }
  .docband .right .stamp {
    margin-top: 5px;
    display: inline-block;
    border: 1px solid var(--line);
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .docband .right .stamp.draft {
    border-color: var(--draft);
    color: var(--draft);
  }

  /* ------------- patient banner ------------- */
  .phead-wrap {
    position: sticky;
    top: 0;
    z-index: 25;
    background: var(--paper);
    margin: 0 -22px 12px;
    padding: 0 22px 0;
    border-bottom: 1px solid var(--ink);
    box-shadow: 0 6px 0 rgba(0,0,0,0.04), 0 1px 0 var(--hair);
  }
  .phead {
    display: grid;
    grid-template-columns: 1.6fr 1fr 1fr 1fr 1.1fr 0.9fr;
    border: 1px solid var(--line);
    background: var(--card);
    margin-bottom: 12px;
  }
  .phead > div {
    padding: 10px 13px 11px;
    border-right: 1px solid var(--hair);
    min-height: 76px;
  }
  .phead > div:last-child { border-right: 0; }

  /* compact vitals strip in the banner — always visible, streams continuously */
  .phead-vitals {
    display: grid;
    grid-template-columns: max-content repeat(5, 1fr);
    gap: 0;
    border: 1px solid var(--line);
    border-top: 0;
    background: var(--card);
    margin: -1px 0 0;
  }
  .phead-vitals .pv-label {
    align-self: stretch;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-right: 1px solid var(--hair);
    background: var(--card-2);
    display: flex; align-items: center;
    writing-mode: horizontal-tb;
  }
  .phead-vitals .pv {
    padding: 6px 12px 7px;
    border-right: 1px solid var(--hair);
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 1px 8px;
    align-items: baseline;
    color: var(--ink);
    position: relative;
  }
  .phead-vitals .pv:last-child { border-right: 0; }
  .phead-vitals .pv-name {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .phead-vitals .pv-val {
    grid-column: 1;
    display: flex; align-items: baseline; gap: 4px;
  }
  .phead-vitals .pv-val .num {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .phead-vitals .pv-val .unit {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .phead-vitals .pv-spark {
    grid-column: 2;
    grid-row: 2;
    width: 56px; height: 22px;
    color: var(--ink-3);
    align-self: center;
  }
  .phead-vitals .pv-delta {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }
  .phead-vitals .pv.signal .pv-val .num { color: var(--accent); }
  .phead-vitals .pv.signal .pv-spark { color: var(--accent); }
  .phead-vitals .pv.signal .pv-delta { color: var(--accent); }
  .phead-vitals .pv.signal::after {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
  }
  .phead .k {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 5px;
  }
  .phead .v { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .name-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .name-row .name { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
  .name-row .mrn { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
  .demo-line { margin-top: 5px; font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
  .demo-line span + span::before { content: "·"; margin: 0 7px; color: var(--ink-4); }

  .acu {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 3px 8px 4px;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .acu .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .acu-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); margin-top: 5px; }

  .constraint-list {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink);
    margin-top: 1px;
    line-height: 1.55;
  }
  .constraint-list .c {
    display: flex; align-items: baseline; gap: 6px;
  }
  .constraint-list .c::before {
    content: "■";
    font-size: 8px;
    color: var(--ink);
    transform: translateY(-1px);
  }
  .constraint-list .c.warn::before { color: var(--accent); }

  .code-pill {
    display: inline-block;
    border: 1px solid var(--line);
    padding: 2px 7px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .status-mini {
    display: flex; flex-direction: column; gap: 3px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-2);
  }
  .status-mini b { color: var(--ink); font-weight: 500; }

  .cycle-box {
    display: flex; flex-direction: column; gap: 3px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-2);
  }
  .cycle-line {
    display: flex; align-items: center; gap: 6px;
  }
  .cycle-line .swatch {
    width: 9px; height: 9px;
    border: 1px solid var(--line);
  }
  .cycle-line .swatch.draft {
    background: var(--draft-soft); border-color: var(--draft);
  }
  .cycle-line .swatch.committed { background: var(--ink); }
  .cycle-line b { color: var(--ink); font-weight: 500; }
  .cycle-line .num {
    margin-left: auto;
    color: var(--ink);
    font-weight: 500;
  }
  .cycle-line .num.draft { color: var(--draft); }

  /* ------------- body grid ------------- */
  .body {
    display: grid;
    grid-template-columns: 196px 1fr 360px;
    gap: 12px;
  }

  /* left nav */
  .nav {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 8px 0 10px;
    align-self: start;
  }
  .nav .group {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 0 13px 5px;
    margin-top: 12px;
  }
  .nav .group:first-child { margin-top: 0; }
  .nav a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 13px 6px 11px;
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    border-left: 2px solid transparent;
    cursor: pointer;
    user-select: none;
  }
  .nav a:hover { background: var(--paper-2); }
  .nav a.active {
    border-left-color: var(--ink);
    background: var(--paper-2);
    font-weight: 500;
  }
  .nav a .ct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .nav a.alert .ct { color: var(--accent); font-weight: 600; }
  .nav a.draft .ct { color: var(--draft); font-weight: 600; }
  .nav-foot {
    margin-top: 18px;
    padding: 9px 13px 0;
    border-top: 1px solid var(--hair);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.6;
  }

  /* ------------- center ------------- */
  .center { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  /* vitals row */
  .vitals-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    border: 1px solid var(--line);
    background: var(--card);
  }
  .vital {
    padding: 9px 11px 11px;
    border-right: 1px solid var(--hair);
    position: relative;
  }
  .vital:last-child { border-right: 0; }
  .vital .name {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .vital .now {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-top: 4px;
  }
  .vital .now small {
    font-size: 11px; color: var(--ink-2); font-weight: 400; margin-left: 4px; letter-spacing: 0;
  }
  .vital .delta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-2);
    margin-top: 3px;
  }
  .vital.signal .now { color: var(--accent); }
  .vital.signal .delta { color: var(--accent); }
  .vital svg { display: block; margin-top: 6px; }

  /* generic panel */
  .panel {
    border: 1px solid var(--line);
    background: var(--card);
  }
  .panel .ph {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 13px 9px;
    border-bottom: 1px solid var(--hair);
    gap: 10px;
  }
  .panel .ph h2 {
    margin: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .panel .ph .ct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .panel .ph .tabs { display: flex; gap: 12px; margin-left: auto; }
  .panel .ph .tabs a {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    cursor: pointer;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
  }
  .panel .ph .tabs a.on { color: var(--ink); border-bottom-color: var(--ink); }
  .panel .body-wrap { padding: 10px 13px 12px; }

  /* event stream / list items */
  .item {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 9px;
    padding: 7px 0;
    border-top: 1px solid var(--hair);
    align-items: start;
  }
  .item:first-child { border-top: 0; padding-top: 3px; }
  .item .marker {
    margin-top: 4px;
    width: 8px; height: 8px;
    border: 1px solid var(--ink);
  }
  .item .marker.dot { border-radius: 50%; }
  .item .marker.fill { background: var(--ink); }
  .item .marker.signal { border-color: var(--accent); }
  .item .marker.signal.fill { background: var(--accent); }
  .item .marker.draft { border-color: var(--draft); border-style: dashed; }
  .item .marker.draft.fill { background: var(--draft); border-style: solid; }
  .item .ttl { font-size: 12.5px; font-weight: 500; letter-spacing: -0.005em; }
  .item .sub {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-2);
    margin-top: 2px;
  }
  .item .meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    text-align: right;
    white-space: nowrap;
  }
  .item .meta b { color: var(--ink); font-weight: 500; }
  .item.alert .meta b { color: var(--accent); }

  .draft-tag {
    display: inline-block;
    margin-left: 6px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--draft);
    border: 1px solid var(--draft-line);
    padding: 1px 5px;
    transform: translateY(-1px);
  }

  /* note block */
  .note .body-wrap p {
    margin: 0 0 8px;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--ink);
  }
  .note .body-wrap p:last-child { margin-bottom: 0; }
  .cite {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    border-bottom: 1px dotted var(--ink-4);
    cursor: help;
    padding-bottom: 1px;
  }

  /* ------------- AGENT CANVAS center ------------- */
  .agent-stack {
    display: flex; flex-direction: column;
    gap: 12px;
  }

  /* canvas detail */
  .canvas-detail {
    border: 1px solid var(--line);
    background: var(--card);
    display: grid;
    grid-template-rows: auto auto 1fr;
  }
  .canvas-detail .ph {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px 10px;
    border-bottom: 1px solid var(--hair);
    gap: 12px;
  }
  .canvas-detail .ph h2 {
    margin: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .canvas-detail .ph .pill {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid var(--draft);
    color: var(--draft);
    font-weight: 600;
  }
  .canvas-detail .ph .pill.committed {
    border-color: var(--ok); color: var(--ok);
  }
  .canvas-detail .ph .pill.discarded {
    border-color: var(--ink-3); color: var(--ink-3);
  }
  .canvas-detail .ph .runmeta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    margin-left: auto;
  }

  .canvas-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--hair);
  }
  .canvas-meta > div {
    padding: 8px 14px;
    border-right: 1px solid var(--hair);
  }
  .canvas-meta > div:last-child { border-right: 0; }
  .canvas-meta .k {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .canvas-meta .v {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink);
    margin-top: 2px;
  }
  .canvas-meta .v.signal { color: var(--accent); }
  .canvas-meta .v.draft { color: var(--draft); }
  .canvas-meta .v.committed { color: var(--ok); }

  .canvas-doc {
    padding: 14px 16px 16px;
    background: repeating-linear-gradient(
      0deg,
      var(--card) 0px, var(--card) 26px,
      var(--card-2) 26px, var(--card-2) 27px
    );
    min-height: 240px;
    position: relative;
  }
  .canvas-doc[data-status="committed"] {
    background: var(--card);
  }
  .canvas-doc[data-status="discarded"] {
    background: var(--card);
    color: var(--ink-3);
  }
  .canvas-doc[data-status="discarded"] .doc-body {
    text-decoration: line-through;
    text-decoration-color: var(--ink-4);
  }
  .canvas-doc .watermark {
    position: absolute;
    top: 14px; right: 18px;
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--draft);
    opacity: 0.10;
    pointer-events: none;
    text-transform: uppercase;
  }
  .canvas-doc[data-status="committed"] .watermark { color: var(--ok); }
  .canvas-doc[data-status="discarded"] .watermark { color: var(--ink-3); }

  .doc-section {
    margin-bottom: 14px;
  }
  .doc-section:last-child { margin-bottom: 0; }
  .doc-section .label {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .doc-section .text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink);
  }
  .doc-section .kv {
    display: grid;
    grid-template-columns: 140px 1fr;
    row-gap: 4px;
    column-gap: 12px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink);
  }
  .doc-section .kv span:nth-child(odd) {
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }

  /* uncertainty bar inside canvas */
  .uncert {
    display: grid;
    grid-template-columns: 160px 1fr 60px;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .uncert .lab { color: var(--ink-2); }
  .uncert .bar {
    height: 5px;
    background: var(--paper-2);
    position: relative;
    border: 1px solid var(--hair);
  }
  .uncert .bar > span {
    position: absolute; top: 0; bottom: 0; left: 0;
    background: var(--ink);
  }
  .uncert .pct { color: var(--ink-2); text-align: right; }

  /* canvas action bar */
  .canvas-actions {
    display: flex; gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--hair);
    background: var(--card-2);
    align-items: center;
  }
  .canvas-actions .left {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .canvas-actions .right {
    margin-left: auto;
    display: flex; gap: 8px;
  }
  .btn {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 7px 12px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 500;
    cursor: pointer;
    text-align: center;
    color: var(--ink);
  }
  .btn:hover { background: var(--paper-2); }
  .btn.primary { background: var(--ink); color: var(--card); border-color: var(--ink); }
  .btn.primary:hover { background: #000; }
  .btn.ghost { border-color: var(--hair); color: var(--ink-2); background: transparent; }
  .btn.danger { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { background: var(--accent-soft); }
  .btn .key {
    display: inline-block;
    margin-left: 6px;
    font-size: 9px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .btn.primary .key { color: rgba(255,255,255,0.55); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* chat (process, lives at bottom) */
  .chat {
    border: 1px solid var(--line);
    background: var(--card);
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 320px;
  }
  .chat .ph {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 9px 13px;
    border-bottom: 1px solid var(--hair);
  }
  .chat .ph h2 {
    margin: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .chat .ph .legend {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .chat .ph .legend b { color: var(--ink); font-weight: 500; }
  .chat-history {
    overflow: auto;
    padding: 10px 14px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .msg {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 12px;
  }
  .msg .who {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-3);
    line-height: 1.55;
    padding-top: 1px;
  }
  .msg.agent .who { color: var(--ink-2); }
  .msg.user .who { color: var(--ink); font-weight: 500; }
  .msg .body {
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink);
  }
  .msg .body .stamp {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    margin-right: 8px;
  }
  .msg .body .ref-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin: 4px 4px 0 0;
    border: 1px solid var(--draft-line);
    background: var(--draft-soft);
    padding: 2px 7px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--draft);
    cursor: pointer;
  }
  .msg .body .ref-chip:hover { background: oklch(0.62 0.14 70 / 0.18); }
  .msg .body .ref-chip::before {
    content: "▢";
    font-size: 9px;
  }
  .msg .body .traces {
    margin: 6px 0 0;
    display: flex; flex-direction: column;
    gap: 3px;
  }
  .msg .body .trace {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
    border-left: 1px solid var(--hair);
    padding: 2px 0 2px 10px;
    line-height: 1.5;
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 8px;
    align-items: baseline;
  }
  .msg .body .trace .tk {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-4);
    display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .msg .body .trace .tk::before {
    content: ""; width: 6px; height: 6px;
    border: 1px solid var(--ink-3);
    background: transparent;
    flex: 0 0 auto;
  }
  .msg .body .trace[data-kind="anchor"]      .tk { color: var(--ink-2); }
  .msg .body .trace[data-kind="anchor"]      .tk::before { background: var(--ink-2); border-color: var(--ink-2); }
  .msg .body .trace[data-kind="weight"]      .tk::before { background: var(--ink-3); border-radius: 50%; }
  .msg .body .trace[data-kind="scope"]       .tk::before { border-style: dashed; }
  .msg .body .trace[data-kind="skipped"]     .tk { color: var(--ink-4); }
  .msg .body .trace[data-kind="skipped"]     .tk::before { background: transparent; border-style: dotted; }
  .msg .body .trace[data-kind="revised"]     .tk { color: var(--draft); }
  .msg .body .trace[data-kind="revised"]     .tk::before { background: var(--draft-soft); border-color: var(--draft); }
  .msg .body .trace[data-kind="uncertainty"] .tk { color: var(--draft); }
  .msg .body .trace[data-kind="uncertainty"] .tk::before {
    background: transparent; border-color: var(--draft);
    box-shadow: inset 0 0 0 1px var(--card);
  }
  /* fallback for legacy single-line reasoning */
  .msg .body .reasoning {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
    border-left: 1px solid var(--hair);
    padding: 2px 0 2px 10px;
    margin: 6px 0 0;
  }
  .msg.system .body {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }

  .chat-input-bar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 9px 11px;
    border-top: 1px solid var(--hair);
    background: var(--card-2);
    align-items: center;
  }
  .chat-input {
    border: 1px solid var(--hair);
    background: var(--card);
    padding: 8px 10px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
    outline: none;
    resize: none;
    min-height: 36px;
  }
  .chat-input:focus { border-color: var(--ink); }
  .chat-input::placeholder { color: var(--ink-3); }
  .chat-send {
    display: flex; gap: 6px;
  }
  .chat-hint {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    display: flex; gap: 16px;
  }
  .chat-hint .key {
    border: 1px solid var(--hair);
    padding: 1px 5px;
    margin-right: 4px;
    color: var(--ink);
  }

  /* ------------- right: artifact scratchpad ------------- */
  .scratchpad {
    border: 1px solid var(--line);
    background: var(--card);
    display: flex; flex-direction: column;
    align-self: start;
    position: sticky;
    top: 14px;
  }
  .scratchpad .ph {
    padding: 10px 13px 9px;
    border-bottom: 1px solid var(--hair);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .scratchpad .ph h2 {
    margin: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .scratchpad .ph .ct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .scratchpad .sub-ph {
    padding: 7px 13px 9px;
    border-bottom: 1px solid var(--hair);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.5;
    background: var(--card-2);
  }
  .scratchpad .sub-ph .legend-row {
    display: flex; gap: 14px; margin-top: 4px;
    flex-wrap: wrap;
  }
  .scratchpad .sub-ph .legend-row .l {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .scratchpad .sub-ph .legend-row .l .sw {
    width: 8px; height: 8px;
    border: 1px solid var(--ink);
  }
  .scratchpad .sub-ph .legend-row .l .sw.draft {
    background: var(--draft-soft); border-color: var(--draft);
  }
  .scratchpad .sub-ph .legend-row .l .sw.staged {
    background: var(--draft); border-color: var(--draft);
  }
  .scratchpad .sub-ph .legend-row .l .sw.committed {
    background: var(--ink);
  }
  .scratchpad .filter-bar {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--hair);
  }
  .scratchpad .filter-bar a {
    flex: 1;
    text-align: center;
    padding: 7px 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-right: 1px solid var(--hair);
    cursor: pointer;
    user-select: none;
  }
  .scratchpad .filter-bar a:last-child { border-right: 0; }
  .scratchpad .filter-bar a:hover { background: var(--paper-2); }
  .scratchpad .filter-bar a.on {
    color: var(--ink);
    background: var(--paper-2);
    font-weight: 600;
  }
  .scratchpad .filter-bar a .ct { color: var(--ink-3); margin-left: 4px; }
  .scratchpad .filter-bar a.on .ct { color: var(--ink-2); }

  .artifact-list {
    overflow: auto;
    max-height: calc(100vh - 80px);
  }
  .artifact {
    border-bottom: 1px solid var(--hair);
    padding: 10px 13px 11px;
    cursor: pointer;
    position: relative;
  }
  .artifact:hover { background: var(--paper-2); }
  .artifact.selected {
    background: var(--paper-2);
  }
  .artifact.selected::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--ink);
  }
  .artifact .row1 {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px;
  }
  .artifact .kind {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .artifact .status {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--draft);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .artifact .status::before {
    content: ""; width: 7px; height: 7px;
    border: 1px solid var(--draft);
    background: var(--draft-soft);
  }
  .artifact .status.staged { color: var(--draft); }
  .artifact .status.staged::before { background: var(--draft); border-color: var(--draft); }
  .artifact .status.committed { color: var(--ok); }
  .artifact .status.committed::before { background: var(--ok); border-color: var(--ok); }
  .artifact .status.discarded { color: var(--ink-3); }
  .artifact .status.discarded::before { background: transparent; border-color: var(--ink-3); border-style: dashed; }
  .artifact .ttl {
    margin-top: 4px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--ink);
  }
  .artifact.discarded .ttl {
    color: var(--ink-3);
    text-decoration: line-through;
    text-decoration-color: var(--ink-4);
  }
  .artifact .preview {
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .artifact .meta {
    margin-top: 6px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    gap: 8px;
  }
  .artifact .meta .refs {
    display: flex; gap: 6px;
    color: var(--ink-3);
  }
  .artifact .meta .refs b { color: var(--ink); font-weight: 500; }
  .artifact .meta .conf {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .artifact .meta .conf .bar {
    width: 32px; height: 4px;
    border: 1px solid var(--hair);
    position: relative; background: var(--paper-2);
  }
  .artifact .meta .conf .bar > span {
    position: absolute; top: 0; bottom: 0; left: 0;
    background: var(--ink);
  }

  /* footer rail */
  .rail {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 4px 0;
    border-top: 1px solid var(--hair);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .rail .keys { display: flex; gap: 14px; }
  .rail .keys span b {
    border: 1px solid var(--hair);
    padding: 1px 5px;
    margin-right: 4px;
    color: var(--ink);
    font-weight: 500;
  }

  /* timeline (overview) */
  .tl-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--hair);
    padding: 7px 0;
    min-height: 36px;
  }
  .tl-row:first-child { border-top: 0; }
  .tl-row .lane {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .tl-track {
    position: relative;
    height: 22px;
  }
  .tl-track .ev {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    height: 18px;
    display: inline-flex; align-items: center;
    padding: 0 8px;
    border: 1px solid var(--line);
    background: var(--card);
    font-family: var(--mono);
    font-size: 10.5px;
    white-space: nowrap;
  }
  .tl-track .ev.signal { border-color: var(--accent); color: var(--accent); }
  .tl-track .ev.fill { background: var(--ink); color: var(--card); border-color: var(--ink); }
  .tl-track .ev.draft {
    border-color: var(--draft);
    color: var(--draft);
    border-style: dashed;
  }
  .tl-track .ev.dot {
    width: 8px; height: 8px; padding: 0; border-radius: 50%; background: var(--ink); border-color: var(--ink);
  }
  .tl-track .ev.dot.signal { background: var(--accent); border-color: var(--accent); }
  .tl-axis {
    position: relative;
    height: 18px;
    margin-bottom: 2px;
    border-bottom: 1px solid var(--hair);
  }
  .tl-axis .tlabel {
    position: absolute; top: 0;
    transform: translateX(-50%);
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
  }

  /* commit toast */
  .toast {
    position: fixed;
    left: 50%; bottom: 28px;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--card);
    border: 1px solid var(--ink);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 100;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    animation: toast-in 180ms ease-out;
  }
  .toast .marker {
    width: 8px; height: 8px;
    background: var(--ok);
    border: 1px solid var(--ok);
  }
  .toast b { color: #fff; font-weight: 500; }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 6px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
  /* tab fade */
  .tabview { animation: tab-in 160ms ease-out; }
  @keyframes tab-in {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* =============== ambient agent dock (persistent across tabs) ================ */
  .stage.agent-on { padding-bottom: 320px; }
  .stage.agent-on.dock-collapsed { padding-bottom: 60px; }
  .stage.agent-on.scratch-open .body { padding-right: 0; }

  .agent-dock {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-top: 2px solid var(--ink);
    z-index: 50;
    display: grid;
    grid-template-columns: 1fr 360px;
    height: 300px;
    box-shadow: 0 -6px 24px rgba(0,0,0,0.06);
    transition: height 180ms ease;
  }
  .agent-dock.scratch-closed {
    grid-template-columns: 1fr 0px;
  }
  .agent-dock.collapsed {
    height: 42px;
    grid-template-columns: 1fr;
  }
  .agent-dock.collapsed .dock-chat,
  .agent-dock.collapsed .dock-scratch { display: none; }

  .dock-rail {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 42px;
    z-index: 49;
    background: var(--card);
    border-top: 2px solid var(--ink);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 18px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
    pointer-events: none;
  }
  .dock-rail > * { pointer-events: auto; }
  .dock-rail .pi-mark {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.04em;
  }
  .dock-rail .run-state {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink);
  }
  .dock-rail .run-state .pulse {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--accent-soft);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .dock-rail .run-state.idle .pulse { background: var(--ink-3); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); animation: none; }

  /* Posture-driven pulse rhythm */
  body[data-run-pulse="off"] .dock-rail .run-state .pulse {
    animation: none; opacity: 0.7;
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  body[data-posture="copilot"] .dock-rail .run-state .pulse {
    animation: pulse 1.1s ease-in-out infinite;
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  body[data-posture="background"] .dock-rail .run-state {
    color: var(--ink-3);
  }

  /* Mood overrides for chrome that uses raw colors */
  body[data-mood="nightshift"], body[data-mood="trauma"] {
    color-scheme: dark;
  }
  body[data-mood="nightshift"] .toast,
  body[data-mood="trauma"] .toast {
    background: var(--card-2); color: var(--ink); border: 1px solid var(--line);
  }
  body[data-mood="trauma"] .dock-rail .run-state .pulse {
    animation: pulse 0.7s ease-in-out infinite;
  }

  /* Density: nudge gaps and paddings via the --pad token where used */
  body[data-density="scan"] { letter-spacing: 0.005em; }
  body[data-density="dictate"] { letter-spacing: -0.005em; }
  .dock-rail .counts {
    display: flex; gap: 14px;
    margin-left: auto;
  }
  .dock-rail .counts .c {
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer;
    padding: 2px 7px;
    border: 1px solid transparent;
  }
  .dock-rail .counts .c:hover { border-color: var(--hair); }
  .dock-rail .counts .c .sw { width: 8px; height: 8px; border: 1px solid var(--ink); }
  .dock-rail .counts .c .sw.draft { background: var(--draft-soft); border-color: var(--draft); }
  .dock-rail .counts .c .sw.staged { background: var(--draft); border-color: var(--draft); }
  .dock-rail .counts .c .sw.committed { background: var(--ink); }
  .dock-rail .counts .c b { color: var(--ink); font-weight: 600; }
  .dock-rail .dock-toggle {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 4px 10px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.10em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
  }
  .dock-rail .dock-toggle:hover { background: var(--paper-2); }
  .dock-rail .dock-toggle.primary { background: var(--ink); color: var(--card); }

  .dock-chat {
    display: grid;
    grid-template-rows: auto 1fr auto;
    border-right: 1px solid var(--hair);
    overflow: hidden;
  }
  .dock-chat .ph {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--hair);
    gap: 10px;
  }
  .dock-chat .ph h2 {
    margin: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .dock-chat .ph .legend {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    margin-left: auto;
    margin-right: 12px;
  }
  .dock-chat .ph .legend b { color: var(--ink); font-weight: 500; }
  .dock-chat .ph .ph-actions { display: flex; gap: 6px; }
  .dock-chat .ph .ph-actions a {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
    cursor: pointer; padding: 2px 6px; border: 1px solid transparent;
    letter-spacing: 0.06em;
  }
  .dock-chat .ph .ph-actions a:hover { color: var(--ink); border-color: var(--hair); }
  .dock-chat .ph .ph-actions a.on { color: var(--ink); border-color: var(--line); }

  .dock-scratch {
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* slide-over scratchpad mode (right side, tall) */
  .scratch-side {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 360px;
    background: var(--card);
    border-left: 1px solid var(--line);
    box-shadow: -2px 0 0 var(--hair);
    z-index: 30;
    display: flex; flex-direction: column;
    animation: slide-in 220ms ease-out;
  }

  /* floating focus card (top-right) */
  .scratch-float {
    position: fixed;
    top: 14px; right: 14px;
    width: 380px;
    background: var(--card);

function ArtifactScratchpad({ artifacts, selectedId, onSelect, filter, setFilter, embedded }) {
  const counts = useMemo(() => ({
    all: artifacts.length,
    draft: artifacts.filter(a => a.status === "draft").length,
    staged: artifacts.filter(a => a.status === "staged").length,
    committed: artifacts.filter(a => a.status === "committed").length,
  }), [artifacts]);

  const filtered = useMemo(() => {
    if (filter === "all") return artifacts;
    return artifacts.filter(a => a.status === filter);
  }, [artifacts, filter]);

  return (
    <aside className="scratchpad" style={embedded ? {position:"static", borderLeft:0, borderTop:0, borderRight:0, borderBottom:0, height:"100%", display:"flex", flexDirection:"column"} : null}>
      <div className="ph">
        <h2>Artifact scratchpad</h2>
        <span className="ct">{filtered.length} of {artifacts.length}</span>
      </div>
      <div className="sub-ph">
        <div>Generated by pi-agent. Not chart truth until committed.</div>
        <div className="legend-row">
          <span className="l"><span className="sw draft"></span>draft</span>
          <span className="l"><span className="sw staged"></span>staged</span>
          <span className="l"><span className="sw committed"></span>committed</span>
        </div>
      </div>
      <div className="filter-bar">
        {[["all","All"],["draft","Draft"],["staged","Staged"],["committed","Committed"]].map(([k, lab]) => (
          <a key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>
            {lab} <span className="ct">{counts[k]}</span>
          </a>
        ))}
      </div>
      <div className="artifact-list">
        {filtered.map(a => (
          <ArtifactItem key={a.id} a={a}
                        selected={a.id === selectedId}
                        onClick={() => onSelect(a.id)}/>
        ))}
      </div>
    </aside>
  );
}

/* Floating focus scratchpad: shows the selected artifact as a card,
   with a thin tab strip across the top for the others. Quiet by default. */
function FloatingScratchpad({ artifacts, selectedId, setSelectedId, filter, setFilter, onClose, onCommit, onStage, onDiscard }) {
  const visible = artifacts.filter(a => a.status !== "discarded");
  const sel = visible.find(a => a.id === selectedId) || visible[0];
  if (!sel) return null;
  const statusOrder = { draft: 0, staged: 1, committed: 2 };
  const sorted = [...visible].sort((a, b) =>
    (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9));

  return (
    <div className="scratch-float">
      <div className="sf-strip">
        <span className="sf-mark">scratchpad</span>
        <div className="sf-tabs">
          {sorted.map(a => (
            <span key={a.id}
                  className={"sf-tab " + a.status + (a.id === sel.id ? " on" : "")}
                  onClick={() => setSelectedId(a.id)}
                  title={a.title}>
              <span className="sf-dot"></span>
              {a.kind.replace(/_/g, " ")}
            </span>
          ))}
        </div>
        <span className="sf-close" onClick={onClose}>✕</span>
      </div>
      <div className="sf-body">
        <div className="sf-row1">
          <span className="kind">{sel.kind}</span>
          <span className={"status " + sel.status}>{sel.status}</span>
        </div>
        <div className="sf-title">{sel.title}</div>
        {sel.preview && <div className="sf-preview">{sel.preview}</div>}
        <div className="sf-meta">
          <span className="refs"><b>{sel.refs ?? "—"}</b> refs · {sel.runId}</span>
          <span className="conf">
            <span className="bar"><span style={{width: `${Math.round(sel.confidence*100)}%`}}></span></span>
            <span>{Math.round(sel.confidence*100)}% conf</span>
          </span>
        </div>
        <div className="sf-actions">
          {sel.status === "draft" && <>
            <button className="btn ghost" onClick={() => onDiscard(sel.id)}>Discard</button>
            <button className="btn" onClick={() => onStage(sel.id)}>Stage to chart</button>
            <button className="btn primary" onClick={() => onCommit(sel.id)}>Commit to note</button>
          </>}
          {sel.status === "staged" && <>
            <button className="btn ghost" onClick={() => onDiscard(sel.id)}>Discard</button>
            <button className="btn primary" onClick={() => onCommit(sel.id)}>Commit to note</button>
          </>}
          {sel.status === "committed" && <span className="sf-committed">Committed · part of chart</span>}
        </div>
      </div>
    </div>
  );
}

function CanvasDoc({ a }) {
  return (
    <div className="canvas-doc" data-status={a.status}>
      <div className="watermark">
        {a.status === "draft" && "DRAFT"}
        {a.status === "staged" && "STAGED"}
        {a.status === "committed" && "COMMITTED"}
        {a.status === "discarded" && "DISCARDED"}
      </div>
      {a.sections.map((s, i) => (
        <div key={i} className="doc-section">
          <div className="label">{s.label}</div>
          {s.kind === "text" && (
            <div className="text">
              {(() => {
                if (!s.cites || !s.cites.length) return s.text;
                let out = s.text;
                const parts = [];
                let last = 0;
                s.cites.forEach((c, ci) => {
                  const idx = out.indexOf(c.token, last);
                  if (idx === -1) return;
                  parts.push(out.slice(last, idx));
                  parts.push(<span key={ci} className="cite" title={c.id}>{c.token}</span>);
                  last = idx + c.token.length;
                });
                parts.push(out.slice(last));
                return parts;
              })()}
            </div>
          )}
          {s.kind === "diff" && (
            <div>
              {s.rows.map((r, ri) => (
                <div key={ri} className="uncert">
                  <span className="lab">{r.label}</span>
                  <span className="bar"><span style={{width:`${Math.round(r.pct*100)}%`}}></span></span>
                  <span className="pct">{r.qual}</span>
                </div>
              ))}
            </div>
          )}
          {s.kind === "kv" && (
            <div className="kv">
              {s.rows.map((r, ri) => (
                <React.Fragment key={ri}>
                  <span>{r[0]}</span><span>{r[1]}</span>
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function ChatHistory({ chat, onJumpRef }) {

    <div className="chat-history" ref={ref}>
      {chat.map((m, i) => (
        <div key={i} className={"msg " + m.role}>
          <span className="who">
            {m.role === "system" ? "system" : (m.role === "user" ? m.who : "pi-agent")}
          </span>
          <div className="body">
            <span className="stamp">09:{29 + Math.floor(i/2)}</span>
            {m.text}
            {m.reasoning && <div className="reasoning">↳ {m.reasoning}</div>}
            {m.traces && m.traces.length > 0 && (
              <div className="traces">
                {m.traces.map((t, ti) => (
                  <div key={ti} className="trace" data-kind={t.kind}>
                    <span className="tk">{t.kind}</span>
                    <span>{t.text}</span>

            {m.refs && (
              <div style={{marginTop: 4}}>

                  <span key={r.id} className="ref-chip" onClick={() => onJumpRef(r.id)}>

    </div>
  );
}

/* Persistent dock: chat (left) + scratchpad (right), always available.
   On Overview tab and Agent Canvas tab. */
function AgentDock({ collapsed, setCollapsed, scratchOpen, setScratchOpen,
                     chat, onSendChat,
                     artifacts, selectedId, setSelectedId, filter, setFilter,
                     onCommit, onStage, onDiscard, onEdit,
                     draftCount, stagedCount, committedCount, runState,
                     scratchpadLayout }) {
  const [draft, setDraft] = useState("");
  const onSubmit = (e) => {
    e.preventDefault();
    if (!draft.trim()) return;
    onSendChat(draft.trim());
    setDraft("");
  };

  if (collapsed) {
    return (
      <div className="dock-rail">
        <span className="pi-mark">π</span>
        <span className="run-state">
          <span className="pulse"></span>
          pi-agent · {runState}
        </span>
        <span style={{color:"var(--ink-3)"}}>run_p002_0930 · cycle #4</span>
        <div className="counts">
          <span className="c" onClick={() => { setCollapsed(false); setFilter("draft"); setScratchOpen(true); }}>
            <span className="sw draft"></span><b>{draftCount}</b> draft
          </span>
          <span className="c" onClick={() => { setCollapsed(false); setFilter("staged"); setScratchOpen(true); }}>
            <span className="sw staged"></span><b>{stagedCount}</b> staged
          </span>
          <span className="c" onClick={() => { setCollapsed(false); setFilter("committed"); setScratchOpen(true); }}>
            <span className="sw committed"></span><b>{committedCount}</b> committed today
          </span>
        </div>
        <button className="dock-toggle primary" onClick={() => setCollapsed(false)}>
          ↑ open agent
        </button>
      </div>
    );
  }

  // when scratchpad layout is not 'rail', the dock is chat-only — never embeds the scratchpad
  const dockEmbedsScratch = (scratchpadLayout || "rail") === "rail";
  return (
    <div className={"agent-dock " + ((scratchOpen && dockEmbedsScratch) ? "" : "scratch-closed")}>
      <div className="dock-chat">
        <div className="ph">
          <h2>pi-agent · chat</h2>
          <span className="legend"><b>Chat is process.</b> Chartable output lands in the scratchpad — never in chat.</span>
          <div className="ph-actions">
            <a className={scratchOpen ? "on" : ""} onClick={() => setScratchOpen(!scratchOpen)}>
              {scratchOpen ? "hide scratchpad" : "show scratchpad"}
            </a>
            <a onClick={() => setCollapsed(true)}>↓ collapse</a>
          </div>
        </div>
        <ChatHistory chat={chat} onJumpRef={(id) => { setSelectedId(id); setScratchOpen(true); }} />
        <form className="chat-input-bar" onSubmit={onSubmit}>
          <textarea
            className="chat-input"
            placeholder="Ask pi-agent to draft, refine, or attach. Output appears in the scratchpad — not in chat."
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => {
              if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) onSubmit(e);
            }}
            rows={2}
          />
          <div className="chat-send" style={{flexDirection:"column", gap:6}}>
            <button type="submit" className="btn primary">Send <span className="key">⌘↵</span></button>
            <button type="button" className="btn ghost" onClick={() => setDraft("")}>Clear</button>
          </div>
          <div className="chat-hint">
            <span><span className="key">⌘↵</span> send</span>
            <span><span className="key">⌘S</span> stage selected</span>
            <span><span className="key">⌘⇧↵</span> commit selected</span>
            <span><span className="key">⌘\</span> toggle dock</span>
            <span style={{marginLeft:"auto"}}>scope: enc_p002_001 · append-only</span>
          </div>
        </form>
      </div>
      {scratchOpen && dockEmbedsScratch && (
        <div className="dock-scratch">
          <ArtifactScratchpad
            artifacts={artifacts}
            selectedId={selectedId}
            onSelect={setSelectedId}
            filter={filter}
            setFilter={setFilter}
            embedded
          />
        </div>
      )}
    </div>
  );
}

/* Three expressive presets that reshape posture, mood, and density together. */
const POSTURES = {
  ambient:   { dockMode: "docked", scratchOpen: true,  runLabel: "standing by",   pulse: false },
  copilot:   { dockMode: "docked", scratchOpen: true,  runLabel: "actively drafting", pulse: true  },
  background:{ dockMode: "rail",   scratchOpen: false, runLabel: "watching · ⌘\\ to summon", pulse: false },
};
const MOODS = {
  daylight: {
    paper:"#f4f2ee", paper2:"#ebe8e2", card:"#fbfaf7", card2:"#f7f5f0",
    ink:"#1a1a1a", ink2:"#4a4a4a", ink3:"#8a8a8a", ink4:"#c4c4c4",
    line:"#1a1a1a", hair:"rgba(26,26,26,0.18)", grid:"rgba(26,26,26,0.06)",
    accentL: 0.62, accentC: 0.16, accentH: 25,
    label: "daylight"
  },
  nightshift: {
    paper:"#15171a", paper2:"#1d2024", card:"#1a1d20", card2:"#1f2226",
    ink:"#e8e6df", ink2:"#a8a59c", ink3:"#6e6c66", ink4:"#3d3d3a",
    line:"#e8e6df", hair:"rgba(232,230,223,0.18)", grid:"rgba(232,230,223,0.06)",
    accentL: 0.72, accentC: 0.14, accentH: 200,
    label: "night shift"
  },
  trauma: {
    paper:"#0e0e0e", paper2:"#161616", card:"#121212", card2:"#181818",
    ink:"#f6f4ec", ink2:"#bdb9aa", ink3:"#7a766a", ink4:"#444",
    line:"#f6f4ec", hair:"rgba(246,244,236,0.22)", grid:"rgba(246,244,236,0.06)",
    accentL: 0.66, accentC: 0.20, accentH: 18,
    label: "trauma bay"
  },
};

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const wrap = {
    position: "fixed", right: 16, top: 16, width: 320, zIndex: 200,
    background: "var(--card)", border: "1px solid var(--line)",
    boxShadow: "0 12px 40px rgba(0,0,0,0.18)",
    fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink)"
  };
  const h = { padding: "10px 14px", borderBottom: "1px solid var(--hair)",
              display: "flex", justifyContent: "space-between", alignItems: "center" };
  const sect = { padding: "12px 14px 14px", borderBottom: "1px solid var(--hair)" };
  const lab = { fontSize: 9.5, letterSpacing: "0.16em", textTransform: "uppercase",
                color: "var(--ink-3)", marginBottom: 8, display: "block" };
  const card = (on) => ({
    padding: "9px 10px",
    border: "1px solid " + (on ? "var(--ink)" : "var(--hair)"),
    background: on ? "var(--paper-2)" : "transparent",
    cursor: "pointer",
    display: "grid",
    gridTemplateColumns: "auto 1fr",
    gap: 8,
    alignItems: "start",
    marginBottom: 6,
  });
  const dot = (color) => ({
    width: 10, height: 10, marginTop: 3,
    background: color, border: "1px solid var(--ink)",
  });
  const cardTtl = { fontSize: 12, fontWeight: 600, letterSpacing: "-0.005em",
                    color: "var(--ink)", textTransform: "none" };
  const cardSub = { fontSize: 10, color: "var(--ink-3)", marginTop: 2,
                    letterSpacing: "0.04em", lineHeight: 1.45 };

  const moodSwatch = (m) => {
    const M = MOODS[m];
    return (
      <div style={{display:"flex", marginTop:3}}>
        <span style={{width:10, height:10, background: M.paper, border:"1px solid "+M.line}}></span>
        <span style={{width:10, height:10, background: M.card, borderTop:"1px solid "+M.line, borderBottom:"1px solid "+M.line}}></span>
        <span style={{width:10, height:10, background: `oklch(${M.accentL} ${M.accentC} ${M.accentH})`, border:"1px solid "+M.line}}></span>
      </div>
    );
  };

  return (
    <div style={wrap}>
      <div style={h}>
        <b style={{fontSize:11, letterSpacing:"0.16em", textTransform:"uppercase"}}>Tweaks · pi-chart</b>
        <span style={{cursor:"pointer", color:"var(--ink-3)"}} onClick={onClose}>✕</span>
      </div>

      {/* 1. Agent posture */}
      <div style={sect}>
        <span style={lab}>agent posture</span>
        {[
          ["ambient",   "Ambient",   "calm dock, drafts visible but quiet"],
          ["copilot",   "Co-pilot",  "scratchpad open, run pulse loud"],
          ["background","Background","rail-only, summon with ⌘\\"],
        ].map(([k, ttl, sub]) => (
          <div key={k} style={card(tweaks.posture === k)}
               onClick={() => setTweak("posture", k)}>
            <span style={dot(k === "copilot" ? "var(--accent)"
                           : k === "ambient" ? "var(--ink)"
                           : "transparent")}></span>
            <div>
              <div style={cardTtl}>{ttl}</div>
              <div style={cardSub}>{sub}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 2. Clinical mood */}
      <div style={sect}>
        <span style={lab}>clinical mood</span>
        {[
          ["daylight",  "Daylight",   "warm paper, restrained accent"],
          ["nightshift","Night shift","graphite + cool blue accent"],
          ["trauma",    "Trauma bay", "max contrast, hot signal red"],
        ].map(([k, ttl, sub]) => (
          <div key={k} style={card(tweaks.mood === k)}
               onClick={() => setTweak("mood", k)}>
            {moodSwatch(k)}
            <div>
              <div style={cardTtl}>{ttl}</div>
              <div style={cardSub}>{sub}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 3. Density / reading mode */}
      <div style={sect}>
        <span style={lab}>information density · {["scan","read","dictate"][tweaks.densityStep]}</span>
        <input type="range" min="0" max="2" step="1"
               value={tweaks.densityStep}
               onChange={e => setTweak("densityStep", +e.target.value)}
               style={{width:"100%"}}/>
        <div style={{display:"flex", justifyContent:"space-between", marginTop:4,
                     fontSize:10, color:"var(--ink-3)", letterSpacing:"0.06em"}}>
          <span>scan · radar</span>
          <span>read</span>
          <span>dictate · large</span>
        </div>
        <div style={{marginTop:8, fontSize:10, color:"var(--ink-3)", lineHeight:1.5}}>
          {tweaks.densityStep === 0 && "Maximum information per square inch. Tight type, dense grids, small vitals — for visual triage at distance."}
          {tweaks.densityStep === 1 && "Calm reading rhythm. Default cockpit posture for sustained chartwork."}
          {tweaks.densityStep === 2 && "Large type, generous padding, oversized vitals. For dictation, handoff, or fatigue."}
        </div>
      </div>

      {/* 4. Scratchpad layout */}
      <div style={sect}>
        <span style={lab}>scratchpad layout</span>
        {[
          ["rail",     "Dock rail",     "lives inside the bottom dock · cramped"],
          ["side",     "Side panel",    "full-height right rail · best for triage"],
          ["floating", "Floating card", "active artifact only · quiet"],
        ].map(([k, ttl, sub]) => (
          <div key={k} style={card(tweaks.scratchpadLayout === k)}
               onClick={() => setTweak("scratchpadLayout", k)}>
            <span style={dot(k === "side" ? "var(--ink)"
                           : k === "floating" ? "var(--accent)"
                           : "transparent")}></span>
            <div>
              <div style={cardTtl}>{ttl}</div>
              <div style={cardSub}>{sub}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{padding:"10px 14px", color:"var(--ink-3)", lineHeight:1.5, fontSize:10.5}}>
        Each preset reshapes posture, color, and rhythm together — not single properties.
      </div>
    </div>
  );
}

/* ================== APP ================== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "posture": "copilot",
  "mood": "daylight",
  "densityStep": 1,
  "scratchpadLayout": "side"
}/*EDITMODE-END*/;

function useTweaksLocal(defaults) {
  const [tweaks, setTweaks] = useState(defaults);
  const setTweak = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    try {
      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
    } catch(e) {}
  };
  return [tweaks, setTweak];
}

function App() {
  const [tweaks, setTweak] = useTweaksLocal(TWEAK_DEFAULTS);
  const [tab, setTab] = useState("overview"); // start on Overview — agent is ambient now
  const [artifacts, setArtifacts] = useState(INITIAL_ARTIFACTS);
  const [selectedId, setSelectedId] = useState("A1");
  const [filter, setFilter] = useState("all");
  const [chat, setChat] = useState(INITIAL_CHAT);
  const [toast, setToast] = useState(null);
  const initPosture = POSTURES[tweaks.posture] || POSTURES.ambient;
  const [dockCollapsed, setDockCollapsed] = useState(initPosture.dockMode === "rail");
  const [scratchOpen, setScratchOpen] = useState(initPosture.scratchOpen);
  const [scratchSlideover, setScratchSlideover] = useState(false);
  const [tweaksPanelOpen, setTweaksPanelOpen] = useState(false);

  // apply mood (paper, ink, accent) and density (type scale, padding) together
  useEffect(() => {
    const root = document.documentElement;
    const M = MOODS[tweaks.mood] || MOODS.daylight;
    root.style.setProperty("--paper", M.paper);
    root.style.setProperty("--paper-2", M.paper2);
    root.style.setProperty("--card", M.card);
    root.style.setProperty("--card-2", M.card2);
    root.style.setProperty("--ink", M.ink);
    root.style.setProperty("--ink-2", M.ink2);
    root.style.setProperty("--ink-3", M.ink3);
    root.style.setProperty("--ink-4", M.ink4);
    root.style.setProperty("--line", M.line);
    root.style.setProperty("--hair", M.hair);
    root.style.setProperty("--grid", M.grid);
    const accentStr = `${M.accentL} ${M.accentC} ${M.accentH}`;
    root.style.setProperty("--accent", `oklch(${accentStr})`);
    root.style.setProperty("--accent-soft", `oklch(${accentStr} / 0.10)`);
    root.style.setProperty("--accent-line", `oklch(${accentStr} / 0.30)`);

    // density: scan / read / dictate — scales type, line-height, paddings, vital sizes
    const d = tweaks.densityStep; // 0,1,2
    const sizes = [
      { base:"11.5px", lh:1.42, pad:"8px 10px",  vital:"36px", title:"15px" },
      { base:"13px",   lh:1.5,  pad:"12px 14px", vital:"44px", title:"17px" },
      { base:"15.5px", lh:1.62, pad:"18px 20px", vital:"58px", title:"21px" },
    ];
    const s = sizes[d] || sizes[1];
    document.body.style.fontSize = s.base;
    document.body.style.lineHeight = s.lh;
    root.style.setProperty("--pad", s.pad);
    root.style.setProperty("--vital-size", s.vital);
    root.style.setProperty("--title-size", s.title);

    // mood class on body for CSS hooks (e.g. graphite scrollbars)
    document.body.dataset.mood = tweaks.mood;
    document.body.dataset.density = ["scan","read","dictate"][d] || "read";
  }, [tweaks.mood, tweaks.densityStep]);

  // posture drives dock + scratchpad together
  useEffect(() => {
    const P = POSTURES[tweaks.posture] || POSTURES.ambient;
    setDockCollapsed(P.dockMode === "rail");
    setScratchOpen(P.scratchOpen);
    document.body.dataset.posture = tweaks.posture;
    document.body.dataset.runPulse = P.pulse ? "on" : "off";
  }, [tweaks.posture]);

  // scratchpad layout: rail / side / floating
  useEffect(() => {
    document.body.dataset.scratchLayout = tweaks.scratchpadLayout || "rail";
  }, [tweaks.scratchpadLayout]);

  const draftCount = artifacts.filter(a => a.status === "draft").length;
  const stagedCount = artifacts.filter(a => a.status === "staged").length;
  const committedCount = artifacts.filter(a => a.status === "committed").length;

  const showToast = (text) => {
    setToast(text);
    setTimeout(() => setToast(null), 2400);
  };

  const updateStatus = (id, status, extra = {}) => {
    setArtifacts(arts => arts.map(a => a.id === id ? { ...a, status, ...extra } : a));
  };

  const onCommit = (id) => {
    const a = artifacts.find(x => x.id === id);
    const stamp = "09:31 · note_20260419T0931_" + (a.kind.split(" ")[0].toLowerCase());
    updateStatus(id, "committed", { committedAt: stamp });
    setFilter("committed");
    showToast(`Committed → ${a.title}. Append-only event written.`);
    setChat(c => [...c, { role: "system", text: `Artifact ${id} committed → ${stamp}. Chart updated. (append-only)` }]);
  };
  const onStage = (id) => {
    updateStatus(id, "staged");
    showToast(`Staged · ${id} now visible on Overview as draft indicator.`);
  };
  const onDiscard = (id) => {
    updateStatus(id, "discarded");
    showToast(`Discarded · ${id}. No chart effect.`);
  };
  const onEdit = (id) => {
    showToast(`Edit mode · ${id}. (prototype: not implemented)`);
  };
  const onJumpToCanvas = (id) => {
    setTab("agent");
    if (id) setSelectedId(id);
  };
  const onSendChat = (text) => {
    setChat(c => [...c,
      { role: "user", who: "rn_shane", text },
      { role: "agent", who: "pi-agent",
        text: "Acknowledged — I'll draft based on the current vitals window and bedside findings. New artifact will appear in the scratchpad when ready.",
        traces: [
          { kind: "scope",       text: "No chart writes will occur until you commit. Run will reuse current evidence chain." },
          { kind: "anchor",      text: "Reusing context: vitals 07:00→09:30, ABG 09:25, bedside WoB 09:05." },
          { kind: "uncertainty", text: "Will surface explicit confidence on the new artifact before staging." },
        ],
      }
    ]);
  };

  // keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.metaKey && e.key === "1") { e.preventDefault(); setTab("overview"); }
      if (e.metaKey && e.key === "2") { e.preventDefault(); setTab("agent"); }
      if (e.metaKey && e.key === "\\") { e.preventDefault(); setDockCollapsed(c => !c); }
      if (e.metaKey && e.key === ".") { e.preventDefault(); setScratchOpen(s => !s); }
      if (selectedId) {
        const a = artifacts.find(x => x.id === selectedId);
        if (!a) return;
        if (a.status === "draft" || a.status === "staged") {
          if (e.metaKey && e.shiftKey && e.key === "Enter") { e.preventDefault(); onCommit(selectedId); }
          else if (e.metaKey && e.key === "s") { e.preventDefault(); onStage(selectedId); }
        }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selectedId, artifacts]);

  const stageClasses = ["stage", "agent-on"];
  if (dockCollapsed) stageClasses.push("dock-collapsed");

  return (
    <div className={stageClasses.join(" ")}>
      <DocBand tab={tab} draftCount={draftCount} stagedCount={stagedCount}/>
      <PatientBanner draftCount={draftCount} stagedCount={stagedCount} committedCount={committedCount}/>
      <div className="body" data-screen-label={tab === "overview" ? "01 Overview" : "02 Agent Canvas"}>
        <LeftNav tab={tab} setTab={setTab} draftCount={draftCount} stagedCount={stagedCount}
                 onOpenScratchpad={() => setScratchSlideover(true)}
                 onOpenTweaks={() => setTweaksPanelOpen(true)}/>
        {tab === "overview" ? (
          <OverviewView artifacts={artifacts} onJumpToCanvas={(id) => {
            if (id) { setSelectedId(id); setScratchOpen(true); setDockCollapsed(false); }
            setTab("agent");
          }}/>
        ) : (
          <AgentCanvasView
            artifacts={artifacts}
            selectedId={selectedId}
            onCommit={onCommit}
            onStage={onStage}
            onDiscard={onDiscard}
            onEdit={onEdit}
          />
        )}
        {/* right column placeholder — both tabs leave room for the dock-rooted scratchpad,
            but on overview we offer a compact agent-activity rail too */}
        {tab === "overview" && tweaks.scratchpadLayout === "rail" && (
          <aside className="scratchpad" style={{position:"sticky", top:14, alignSelf:"start"}}>
            <div className="ph">
              <h2>Agent activity · ambient</h2>
              <span className="ct">{draftCount + stagedCount} pending</span>
            </div>
            <div className="sub-ph">
              <div>Pi-agent runs continuously on this encounter. Drafts here are <b>not chart truth</b> until committed below.</div>
            </div>
            <div className="filter-bar">
              <a className="on" onClick={()=>{setTab("agent"); setScratchOpen(true);}}>Open canvas →</a>
              <a onClick={()=>{setScratchOpen(true); setDockCollapsed(false);}}>Focus scratchpad ↓</a>
            </div>
            <div style={{padding:"4px 0", maxHeight: 360, overflow:"auto"}}>
              {artifacts.filter(a => a.status !== "discarded").slice(0, 5).map(a => (
                <div key={a.id} className={"artifact " + a.status} onClick={()=>{
                  setSelectedId(a.id); setTab("agent"); setScratchOpen(true); setDockCollapsed(false);
                }}>
                  <div className="row1">
                    <span className="kind">{a.kind}</span>
                    <span className={"status " + a.status}>{a.status}</span>
                  </div>
                  <div className="ttl" style={{fontSize:12.5}}>{a.title}</div>
                  <div className="meta">
                    <span className="refs">{a.runId}</span>
                    <span className="conf">
                      <span className="bar"><span style={{width: `${Math.round(a.confidence*100)}%`}}></span></span>
                      <span>{Math.round(a.confidence*100)}%</span>
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </aside>
        )}
      </div>

      {/* persistent agent dock */}
      <AgentDock
        collapsed={dockCollapsed}
        setCollapsed={setDockCollapsed}
        scratchOpen={scratchOpen}
        setScratchOpen={setScratchOpen}
        chat={chat}
        onSendChat={onSendChat}
        artifacts={artifacts}
        selectedId={selectedId}
        setSelectedId={setSelectedId}
        filter={filter}
        setFilter={setFilter}
        onCommit={onCommit}
        onStage={onStage}
        onDiscard={onDiscard}
        onEdit={onEdit}
        draftCount={draftCount}
        stagedCount={stagedCount}
        committedCount={committedCount}
        runState={(POSTURES[tweaks.posture] || POSTURES.ambient).runLabel}
        scratchpadLayout={tweaks.scratchpadLayout}
      />

      {/* Scratchpad as full-height side panel */}
      {tweaks.scratchpadLayout === "side" && scratchOpen && (
        <aside className="scratch-side">
          <ArtifactScratchpad
            artifacts={artifacts}
            selectedId={selectedId}
            onSelect={setSelectedId}
            filter={filter}
            setFilter={setFilter}
            embedded
          />
        </aside>
      )}

      {/* Scratchpad as floating focus card (selected artifact + thin tab strip) */}
      {tweaks.scratchpadLayout === "floating" && scratchOpen && (
        <FloatingScratchpad
          artifacts={artifacts}
          selectedId={selectedId}
          setSelectedId={setSelectedId}
          filter={filter}
          setFilter={setFilter}
          onClose={() => setScratchOpen(false)}
          onCommit={onCommit}
          onStage={onStage}
          onDiscard={onDiscard}
        />
      )}

      {/* slide-over scratchpad (large) */}
      {scratchSlideover && (
        <div className="scratch-slideover">
          <div className="ph">
            <h2>Artifact scratchpad · full</h2>
            <span className="closer" onClick={() => setScratchSlideover(false)}>close ✕</span>
          </div>
          <ArtifactScratchpad
            artifacts={artifacts}
            selectedId={selectedId}
            onSelect={(id) => { setSelectedId(id); setTab("agent"); setScratchSlideover(false); setScratchOpen(true); }}
            filter={filter}
            setFilter={setFilter}
            embedded
          />
        </div>
      )}

      {tweaksPanelOpen && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => setTweaksPanelOpen(false)}/>
      )}

      {toast && (
        <div className="toast">
          <span className="marker"></span>
          <span><b>{toast}</b></span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
